<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Inventario | Premvida</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f6fbf4; color: #2b352d; }
        .nav-link:hover { background-color: #eff5ed; color: #3f6754; }
        .active-nav { background-color: #3f6754; color: white !important; font-weight: 700; }
        .product-row:hover { background-color: #eff5ed; }
        .modal-glass { background: rgba(246, 251, 244, 0.8); backdrop-filter: blur(12px); }
        input::-webkit-inner-spin-button { display: none; }
    </style>
</head>
<body class="min-h-screen flex">

    <aside class="fixed left-0 top-0 h-full flex flex-col p-4 bg-emerald-50 w-64 border-r-0 z-50">
        <div class="mb-10 px-4 pt-4">
            <h1 class="text-2xl font-black tracking-tighter text-emerald-900">Premvida</h1>
            <p class="text-[10px] uppercase font-bold tracking-[0.2em] text-emerald-800/40">Botanical Retail</p>
        </div>

        <nav class="flex-1 space-y-2">
            <a href="../dashboard.html" class="nav-link flex items-center gap-3 px-4 py-3 text-emerald-800/60 rounded-xl transition-all">
                <span class="material-symbols-outlined">dashboard</span>
                <span class="text-sm">Dashboard</span>
            </a>
            <a href="inventory.html" class="active-nav flex items-center gap-3 px-4 py-3 rounded-xl transition-all">
                <span class="material-symbols-outlined">inventory_2</span>
                <span class="text-sm font-bold">Inventario</span>
            </a>
            <a href="sales.html" class="nav-link flex items-center gap-3 px-4 py-3 text-emerald-800/60 rounded-xl transition-all">
                <span class="material-symbols-outlined">point_of_sale</span>
                <span class="text-sm">Ventas</span>
            </a>
            <a href="expenses.html" class="nav-link flex items-center gap-3 px-4 py-3 text-emerald-800/60 rounded-xl transition-all">
                <span class="material-symbols-outlined">payments</span>
                <span class="text-sm">Gastos</span>
            </a>
            <a href="drafts.html" class="nav-link flex items-center gap-3 px-4 py-3 text-emerald-800/60 rounded-xl transition-all">
                <span class="material-symbols-outlined">drafts</span>
                <span class="text-sm">Borradores</span>
            </a>
            <a href="orders.html" class="nav-link flex items-center gap-3 px-4 py-3 text-emerald-800/60 rounded-xl transition-all">
                <span class="material-symbols-outlined">list_alt</span>
                <span class="text-sm">Órdenes</span>
            </a>
        </aside>

        <div class="mt-auto p-4 bg-white/50 rounded-2xl">
            <button onclick="window.location.href='sales.html'" class="w-full py-3 bg-[#3f6754] text-white rounded-xl font-bold text-xs shadow-lg active:scale-95 transition-all">
                NUEVA VENTA
            </button>
        </div>
    </aside>

    <main class="flex-1 ml-64 p-8 lg:p-12">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-end mb-12 gap-6">
            <div>
                <span class="text-[#3f6754] font-black tracking-[0.2em] text-[10px] uppercase mb-2 block">Stock & Catálogo</span>
                <h2 class="text-5xl font-black text-[#3f6754] tracking-tighter leading-none">Inventario</h2>
            </div>
            <button onclick="toggleModal(true)" class="flex items-center gap-2 px-8 py-4 bg-[#3f6754] text-white rounded-[1.25rem] font-bold shadow-xl hover:bg-[#335b48] transition-all active:scale-95">
                <span class="material-symbols-outlined text-sm">add</span> Nuevo Producto
            </button>
        </header>

        <div class="mb-12 max-w-md">
            <div class="relative group">
                <span class="absolute inset-y-0 left-4 flex items-center text-emerald-800/30 group-focus-within:text-[#3f6754] transition-colors">
                    <span class="material-symbols-outlined">search</span>
                </span>
                <input type="text" id="searchInput" placeholder="Buscar por SKU o Nombre..." 
                       class="w-full pl-12 pr-6 py-4 bg-white border-none rounded-2xl shadow-sm focus:ring-2 focus:ring-[#3f6754] transition-all text-sm font-medium">
            </div>
        </div>

        <div class="bg-white rounded-[3rem] p-10 shadow-sm border border-emerald-50">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-separate border-spacing-y-2">
                    <thead>
                        <tr class="text-gray-400 text-[10px] font-black uppercase tracking-[0.2em]">
                            <th class="px-8 pb-4">Detalles del Producto</th>
                            <th class="px-8 pb-4">SKU / Marca</th>
                            <th class="px-8 pb-4">Existencia</th>
                            <th class="px-8 pb-4 text-right">Precio Venta</th>
                            <th class="px-8 pb-4 text-right">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryTableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="productModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 modal-glass">
        <div class="bg-white w-full max-w-xl rounded-[2.5rem] p-10 shadow-2xl relative overflow-hidden">
            <h3 class="text-2xl font-black text-[#3f6754] mb-8 tracking-tight">Registro de Botánica</h3>
            
            <div class="grid grid-cols-2 gap-6">
                <div class="col-span-2">
                    <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-2 block">Nombre del Producto</label>
                    <input type="text" id="name" placeholder="Ej: Ficus Lyrata" class="w-full bg-emerald-50 border-none rounded-xl p-4 focus:ring-2 focus:ring-[#3f6754]">
                </div>
                
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-2 block">Marca / Proveedor</label>
                    <input type="text" id="company" placeholder="Ej: BioGarden" class="w-full bg-emerald-50 border-none rounded-xl p-4 focus:ring-2 focus:ring-[#3f6754]">
                </div>

                <div>
                    <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-2 block">Stock Inicial</label>
                    <input type="number" id="stock" placeholder="0" class="w-full bg-emerald-50 border-none rounded-xl p-4 focus:ring-2 focus:ring-[#3f6754]">
                </div>

                <div>
                    <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-2 block">Costo (Bs)</label>
                    <input type="number" id="costPrice" placeholder="0.00" class="w-full bg-emerald-50 border-none rounded-xl p-4 focus:ring-2 focus:ring-[#3f6754]">
                </div>

                <div>
                    <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-2 block">Precio Venta (Bs)</label>
                    <input type="number" id="salePrice" placeholder="0.00" class="w-full bg-emerald-50 border-none rounded-xl p-4 focus:ring-2 focus:ring-[#3f6754]">
                </div>
            </div>

            <div class="flex gap-4 mt-10">
                <button onclick="toggleModal(false)" class="flex-1 py-4 text-gray-400 font-bold hover:text-gray-600 transition-colors">
                    Cancelar
                </button>
                <button onclick="addProduct()" class="flex-1 bg-[#3f6754] text-white rounded-2xl font-bold py-4 shadow-lg hover:bg-[#335b48] transition-all">
                    Guardar Producto
                </button>
            </div>
        </div>
    </div>

    <script src="../js/firebase.js"></script>
    <script src="../js/products.js"></script>
    <script>
        // Carga inicial al entrar
        window.onload = () => {
            if(typeof loadProducts === 'function') loadProducts();
        };
    </script>
</body>
</html>
