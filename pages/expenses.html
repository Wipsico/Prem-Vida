<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Gestión de Gastos | Premvida</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f6fbf4; color: #2b352d; }
        .nav-link:hover { background-color: #eff5ed; color: #3f6754; }
        .active-nav { background-color: #3f6754; color: white !important; font-weight: 700; }
        .expense-row:hover { background-color: #eff5ed; }
        input::-webkit-inner-spin-button { display: none; }
    </style>
</head>
<body class="min-h-screen flex">

    <aside class="fixed left-0 top-0 h-full flex flex-col p-4 bg-emerald-50 w-64 border-r-0 z-50">
        <div class="mb-10 px-4 pt-4">
            <h1 class="text-2xl font-black tracking-tighter text-emerald-900">Premvida</h1>
            <p class="text-[10px] uppercase font-bold tracking-[0.2em] text-emerald-800/40">Botanical Retail</p>
        </div>

        <nav class="flex-1 space-y-2">
            <a href="../dashboard.html" class="nav-link flex items-center gap-3 px-4 py-3 text-emerald-800/60 rounded-xl transition-all">
                <span class="material-symbols-outlined">dashboard</span>
                <span class="text-sm">Dashboard</span>
            </a>
            <a href="inventory.html" class="nav-link flex items-center gap-3 px-4 py-3 text-emerald-800/60 rounded-xl transition-all">
                <span class="material-symbols-outlined">inventory_2</span>
                <span class="text-sm">Inventario</span>
            </a>
            <a href="sales.html" class="nav-link flex items-center gap-3 px-4 py-3 text-emerald-800/60 rounded-xl transition-all">
                <span class="material-symbols-outlined">point_of_sale</span>
                <span class="text-sm">Ventas</span>
            </a>
            <a href="expenses.html" class="active-nav flex items-center gap-3 px-4 py-3 rounded-xl transition-all">
                <span class="material-symbols-outlined">payments</span>
                <span class="text-sm font-bold">Gastos</span>
            </a>
            <a href="drafts.html" class="nav-link flex items-center gap-3 px-4 py-3 text-emerald-800/60 rounded-xl transition-all">
                <span class="material-symbols-outlined">drafts</span>
                <span class="text-sm">Borradores</span>
            </a>
            <a href="orders.html" class="nav-link flex items-center gap-3 px-4 py-3 text-emerald-800/60 rounded-xl transition-all">
                <span class="material-symbols-outlined">list_alt</span>
                <span class="text-sm">Órdenes</span>
            </a>
        </nav>
    </aside>

    <main class="flex-1 ml-64 p-8 lg:p-12">
        <header class="mb-12">
            <span class="text-[#3f6754] font-black tracking-[0.2em] text-[10px] uppercase mb-2 block">Administración de Flujo</span>
            <h2 class="text-5xl font-black text-[#3f6754] tracking-tighter">Gastos Operativos</h2>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
            
            <section class="bg-white rounded-[2.5rem] p-10 shadow-sm border border-emerald-50 h-fit">
                <h3 class="text-xs font-black uppercase tracking-[0.2em] text-gray-400 mb-8">Nuevo Registro</h3>
                
                <div class="space-y-6">
                    <div>
                        <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-2 block">Descripción</label>
                        <input type="text" id="expenseDesc" placeholder="Ej: Pago de Alquiler" 
                               class="w-full bg-emerald-50 border-none rounded-xl p-4 focus:ring-2 focus:ring-[#3f6754]">
                    </div>
                    
                    <div>
                        <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-2 block">Categoría</label>
                        <select id="expenseCat" class="w-full bg-emerald-50 border-none rounded-xl p-4 focus:ring-2 focus:ring-[#3f6754]">
                            <option value="Servicios">Servicios</option>
                            <option value="Suministros">Suministros</option>
                            <option value="Marketing">Marketing</option>
                            <option value="Mantenimiento">Mantenimiento</option>
                            <option value="General">General</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-2 block">Monto (Bs)</label>
                            <input type="number" id="expenseAmount" placeholder="0.00" 
                                   class="w-full bg-emerald-50 border-none rounded-xl p-4 focus:ring-2 focus:ring-[#3f6754]">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-2 block">Fecha</label>
                            <input type="date" id="expenseDate" 
                                   class="w-full bg-emerald-50 border-none rounded-xl p-4 focus:ring-2 focus:ring-[#3f6754] text-xs">
                        </div>
                    </div>

                    <button onclick="saveExpense()" class="w-full py-5 bg-[#3f6754] text-white rounded-2xl font-black text-sm shadow-lg shadow-emerald-900/20 active:scale-95 transition-all mt-4">
                        REGISTRAR GASTO
                    </button>
                </div>
            </section>

            <section class="lg:col-span-2">
                <div class="bg-white rounded-[3rem] p-10 shadow-sm border border-emerald-50">
                    <div class="flex justify-between items-center mb-8">
                        <h3 class="text-xs font-black uppercase tracking-[0.2em] text-gray-400">Últimos Movimientos</h3>
                        <div id="totalMonthlyExpenses" class="text-sm font-black text-[#3f6754]">Bs 0.00</div>
                    </div>
                    
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-separate border-spacing-y-2">
                            <thead>
                                <tr class="text-gray-400 text-[10px] font-black uppercase tracking-[0.2em]">
                                    <th class="px-6 pb-4">Concepto / Fecha</th>
                                    <th class="px-6 pb-4">Categoría</th>
                                    <th class="px-6 pb-4 text-right">Monto</th>
                                </tr>
                            </thead>
                            <tbody id="expensesTableBody">
                                </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script src="../js/firebase.js"></script>
    <script src="../js/movements.js"></script>
    <script src="../js/expenses.js"></script>
    
    <script>
        // Aseguramos que la fecha por defecto sea hoy
        document.addEventListener('DOMContentLoaded', () => {
            const dateInput = document.getElementById('expenseDate');
            if (dateInput) {
                dateInput.valueAsDate = new Date();
            }
        });
    </script>
</body>
</html>
