<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Bienvenido | Premvida</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f6fbf4; 
            color: #2b352d;
            overflow: hidden; 
        }
        .bg-botanical {
            background: linear-gradient(135deg, #f6fbf4 0%, #e8f0e5 100%);
        }
        .glass-welcome {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .floating-leaf {
            position: absolute;
            z-index: -1;
            opacity: 0.1;
            filter: grayscale(1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 bg-botanical">

    <span class="material-symbols-outlined floating-leaf text-[300px] -top-20 -left-20 rotate-45">eco</span>
    <span class="material-symbols-outlined floating-leaf text-[200px] -bottom-10 -right-10 -rotate-12">potted_plant</span>

    <main class="w-full max-w-5xl grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
        
        <div class="space-y-6">
            <div class="mb-12 flex flex-col items-center lg:items-start text-center lg:text-left">
                <img src="image_cab7c8.png" alt="Logo Premvida" class="h-32 w-auto object-contain mix-blend-multiply opacity-90 mb-4 transition-opacity hover:opacity-100">
                <p class="text-[10px] uppercase font-bold tracking-[0.3em] text-emerald-800/40">Botanical Retail System</p>
            </div>
            
            <h2 class="text-7xl font-black text-[#3f6754] tracking-tighter leading-[0.9]">
                Cultiva el <br> <span class="text-emerald-300">orden</span> de tu negocio.
            </h2>
            
            <p class="text-emerald-800/60 font-medium max-w-sm leading-relaxed mx-auto lg:mx-0">
                Gestión inteligente de inventarios, ventas y activos fijos con una interfaz diseñada para la calma y la precisión.
            </p>
        </div>

        <div class="glass-welcome p-12 rounded-[3.5rem] shadow-2xl shadow-emerald-900/10">
            <div class="mb-10 text-center lg:text-left">
                <h3 class="text-2xl font-black text-emerald-900 tracking-tight">Acceso al Sistema</h3>
                <p class="text-sm text-gray-400 font-medium italic">Ingresa tus credenciales de terminal.</p>
            </div>

            <form class="space-y-6">
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-2 block ml-1">Identificador</label>
                    <div class="relative group">
                        <span class="absolute inset-y-0 left-4 flex items-center text-emerald-800/30 group-focus-within:text-[#3f6754] transition-colors">
                            <span class="material-symbols-outlined text-xl">person</span>
                        </span>
                        <input type="text" placeholder="wicholeonhart14@gmail.com" 
                               class="w-full pl-12 pr-6 py-4 bg-white/50 border-none rounded-2xl focus:ring-2 focus:ring-[#3f6754] transition-all font-medium text-sm">
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-2 block ml-1">Contraseña</label>
                    <div class="relative group">
                        <span class="absolute inset-y-0 left-4 flex items-center text-emerald-800/30 group-focus-within:text-[#3f6754] transition-colors">
                            <span class="material-symbols-outlined text-xl">lock</span>
                        </span>
                        <input type="password" placeholder="••••••••••••" 
                               class="w-full pl-12 pr-6 py-4 bg-white/50 border-none rounded-2xl focus:ring-2 focus:ring-[#3f6754] transition-all font-medium text-sm">
                    </div>
                </div>

                <div class="pt-4">
                    <button type="button" 
                            onclick="window.location.href='dashboard.html'"
                            class="w-full py-5 bg-[#3f6754] text-white rounded-2xl font-black text-sm shadow-xl shadow-emerald-900/20 active:scale-95 transition-all flex items-center justify-center gap-3 hover:bg-[#335b48]">
                        ENTRAR AL ARBORETUM
                        <span class="material-symbols-outlined text-sm">arrow_forward</span>
                    </button>
                </div>

                <div class="text-center pt-4 border-t border-dashed border-emerald-100/50">
                    <p class="text-[10px] font-bold text-emerald-800/30 uppercase tracking-[0.2em]">
                        PREMVIDA V2.0 • 2026
                    </p>
                </div>
            </form>
        </div>
    </main>

    <script src="js/firebase.js"></script>
</body>
</html>
